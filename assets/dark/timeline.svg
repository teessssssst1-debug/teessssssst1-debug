<svg viewBox="0 0 1200 250" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Timeline: 2018 college, 2022 Tezpur and Worxstax, 2024 FootprintIQ, 2025 Bujibo.AI, now open to roles">
  <style>
    :root { --bone: #444444; --muted: #888888; --dim: #AAAAAA; --rule: #C0C0C0; --accent: #555555; }
    @media (prefers-color-scheme: dark) { :root { --bone: #DDDDDD; --muted: #777777; --dim: #666666; --rule: #444444; --accent: #AAAAAA; } }
    .mono { font-family: ui-monospace, "SFMono-Regular", "SF Mono", Menlo, Consolas, "Liberation Mono", monospace; }
    .axis { stroke: var(--rule); stroke-width: 1; stroke-dasharray: 1110; stroke-dashoffset: 1110; animation: draw 2.4s cubic-bezier(.6,0,.2,1) forwards; }
    @keyframes draw { to { stroke-dashoffset: 0; } }
    .m { opacity: 0; animation: rise .7s cubic-bezier(.2,.7,.2,1) forwards; }
    @keyframes rise { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .m1{animation-delay:.4s}.m2{animation-delay:.9s}.m3{animation-delay:1.4s}.m4{animation-delay:1.7s}.m5{animation-delay:2.0s}.m6{animation-delay:2.3s}.m7{animation-delay:2.6s}
    .pulse { animation: pulse 2.6s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
    .ring { animation: ring 2.6s ease-out infinite; transform-origin: 1060px 125px; }
    @keyframes ring { 0%{transform:scale(.4);opacity:.8} 80%,100%{transform:scale(3);opacity:0} }
    @media (prefers-reduced-motion: reduce) {
      .axis,.m,.pulse,.ring { animation: none; } .axis{stroke-dashoffset:0} .m{opacity:1} .ring{opacity:0}
    }
      :root { --bone:#FFFFFF; --muted:#FFFFFF; --dim:#FFFFFF; --rule:#FFFFFF; --accent:#FFFFFF; --node-bg:#000000; --core-bg:#000000; --ghost:#FFFFFF; --ink:#FFFFFF; --paper:#000000; }
  </style>

  <line x1="48" y1="40" x2="1152" y2="40" stroke="var(--rule)"/>
  <text fill="var(--muted)" class="mono" x="48" y="28" font-size="11" letter-spacing="3.5">THE ROUTE SO FAR</text>
  <text fill="var(--muted)" class="mono" x="1152" y="28" font-size="11" letter-spacing="3.5" text-anchor="end">FIG. 03</text>

  <line class="axis" x1="48" y1="125" x2="1158" y2="125"/>

  <g class="m m1">
    <circle cx="100" cy="125" r="4" fill="var(--bone)"/>
    <line x1="100" y1="121" x2="100" y2="96" stroke="var(--rule)"/>
    <text fill="var(--accent)" class="mono" x="100" y="74" font-size="11" letter-spacing="2" text-anchor="middle">2018</text>
    <text fill="var(--bone)" class="mono" x="100" y="90" font-size="10.5" letter-spacing="1" text-anchor="middle">HS Science · Guwahati</text>
  </g>

  <g class="m m2">
    <circle cx="310" cy="125" r="4" fill="var(--bone)"/>
    <line x1="310" y1="129" x2="310" y2="154" stroke="var(--rule)"/>
    <text fill="var(--accent)" class="mono" x="310" y="172" font-size="11" letter-spacing="2" text-anchor="middle">2022</text>
    <text fill="var(--bone)" class="mono" x="310" y="188" font-size="10.5" letter-spacing="1" text-anchor="middle">Tezpur Univ · Worxstax</text>
  </g>

  <g class="m m3">
    <circle cx="520" cy="125" r="4" fill="var(--bone)"/>
    <line x1="520" y1="121" x2="520" y2="96" stroke="var(--rule)"/>
    <text fill="var(--accent)" class="mono" x="520" y="74" font-size="11" letter-spacing="2" text-anchor="middle">2024</text>
    <text fill="var(--bone)" class="mono" x="520" y="90" font-size="10.5" letter-spacing="1" text-anchor="middle">Storeily shipped · joined FootprintIQ</text>
  </g>

  <g class="m m4">
    <circle cx="730" cy="125" r="4" fill="var(--bone)"/>
    <line x1="730" y1="129" x2="730" y2="154" stroke="var(--rule)"/>
    <text fill="var(--accent)" class="mono" x="730" y="172" font-size="11" letter-spacing="2" text-anchor="middle">2025</text>
    <text fill="var(--bone)" class="mono" x="730" y="188" font-size="10.5" letter-spacing="1" text-anchor="middle">93% AWS cost cut · Bujibo.AI</text>
  </g>

  <g class="m m5">
    <circle cx="880" cy="125" r="4" fill="var(--bone)"/>
    <line x1="880" y1="121" x2="880" y2="96" stroke="var(--rule)"/>
    <text fill="var(--accent)" class="mono" x="880" y="74" font-size="11" letter-spacing="2" text-anchor="middle">2025</text>
    <text fill="var(--bone)" class="mono" x="880" y="90" font-size="10.5" letter-spacing="1" text-anchor="middle">YC / EF application · AI products</text>
  </g>

  <g class="m m6">
    <circle class="ring" cx="1060" cy="125" r="4" stroke="var(--accent)" fill="none"/>
    <circle class="pulse" cx="1060" cy="125" r="4.5" fill="var(--accent)"/>
    <line x1="1060" y1="129" x2="1060" y2="154" stroke="var(--rule)"/>
    <text fill="var(--accent)" class="mono" x="1060" y="172" font-size="11" letter-spacing="2" text-anchor="middle">NOW</text>
    <text fill="var(--bone)" class="mono" x="1060" y="188" font-size="10.5" letter-spacing="1" text-anchor="middle">3+ yrs · open to full-time</text>
  </g>

  <g class="m m7">
    <circle cx="1152" cy="125" r="3" fill="var(--dim)"/>
    <text fill="var(--dim)" class="mono" x="1152" y="105" font-size="10" letter-spacing="2" text-anchor="end">2026 →</text>
    <text fill="var(--dim)" class="mono" x="1152" y="150" font-size="13" text-anchor="end">the interesting part</text>
  </g>
</svg>
