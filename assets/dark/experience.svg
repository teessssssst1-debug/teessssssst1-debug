<svg viewBox="0 0 1000 370" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Experience — FootprintIQ.ai, Worxstax, Tezpur University">
  <style>
    :root { --bone: #444444; --rule: #C0C0C0; --muted: #888888; --dim: #AAAAAA; --accent: #555555; }
    @media (prefers-color-scheme: dark) { :root { --bone: #DDDDDD; --rule: #444444; --muted: #777777; --dim: #666666; --accent: #AAAAAA; } }
    .mono { font-family: ui-monospace, "SFMono-Regular", "SF Mono", Menlo, Consolas, "Liberation Mono", monospace; }
    .rise { opacity: 0; animation: rise .7s cubic-bezier(.2,.7,.2,1) forwards; }
    @keyframes rise { from { opacity:0;transform:translateY(8px); } to { opacity:1;transform:translateY(0); } }
    .a1{animation-delay:.15s} .a2{animation-delay:.35s} .a3{animation-delay:.55s} .a4{animation-delay:.75s}
    @media (prefers-reduced-motion: reduce) { .rise { animation: none; opacity: 1; } }
      :root { --bone:#FFFFFF; --muted:#FFFFFF; --dim:#FFFFFF; --rule:#FFFFFF; --accent:#FFFFFF; --node-bg:#000000; --core-bg:#000000; --ghost:#FFFFFF; --ink:#FFFFFF; --paper:#000000; }
  </style>

  <line x1="120" y1="10" x2="120" y2="360" stroke="var(--rule)" stroke-width="1" opacity=".4"/>

  <g class="rise a1">
    <text class="mono" x="48" y="42"  font-size="12" fill="var(--accent)" letter-spacing="2">2024</text>
    <text class="mono" x="136" y="42"  font-size="15" fill="var(--bone)">FootprintIQ.ai · Software Engineer · Singapore · Sep 2024 – Oct 2025</text>
    <text class="mono" x="136" y="68"  font-size="14" fill="var(--muted)">architected carbon emission platform with AI dashboards &amp; automated PPTX reporting</text>
    <text class="mono" x="136" y="90"  font-size="14" fill="var(--muted)">cut AWS spend 93% ($6K → $400/mo) via Athena, Glue, Lambda, RDS optimization</text>
  </g>

  <g class="rise a2">
    <text class="mono" x="48" y="138" font-size="12" fill="var(--accent)" letter-spacing="2">2022</text>
    <text class="mono" x="136" y="138" font-size="15" fill="var(--bone)">Worxstax · Software Engineer · Bangalore · Jul 2022 – Apr 2024</text>
    <text class="mono" x="136" y="164" font-size="14" fill="var(--muted)">led Storeily web &amp; mobile — auth, onboarding, guest access, analytics</text>
    <text class="mono" x="136" y="186" font-size="14" fill="var(--muted)">social graph (Neo4j) · real-time notifications (Lambda + Firebase) · image editor</text>
  </g>

  <g class="rise a3">
    <text class="mono" x="48" y="234" font-size="12" fill="var(--accent)" letter-spacing="2">2025</text>
    <text class="mono" x="136" y="234" font-size="15" fill="var(--bone)">Bujibo.AI · Solo Founder · Applied to YC &amp; EF · Jul 2025 – Feb 2026</text>
    <text class="mono" x="136" y="260" font-size="14" fill="var(--muted)">AI database chat platform — natural language queries → chat, charts, reports</text>
    <text class="mono" x="136" y="282" font-size="14" fill="var(--muted)">React · TypeScript · FastAPI · secure auth · real-time processing</text>
  </g>

  <g class="rise a4">
    <text class="mono" x="48" y="330" font-size="12" fill="var(--accent)" letter-spacing="2">2022</text>
    <text class="mono" x="136" y="330" font-size="15" fill="var(--bone)">Tezpur University · B.Tech Electrical Engineering · CGPA 7.3</text>
    <text class="mono" x="136" y="356" font-size="14" fill="var(--muted)">IIT Ropar NPTEL — Joy of Computing using Python · top 5% (91%)</text>
  </g>
</svg>
