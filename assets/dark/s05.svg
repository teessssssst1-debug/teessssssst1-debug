<svg viewBox="0 0 1000 92" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Section 05 — THE ROUTE">
  <style>
    :root { --rule: #C0C0C0; --muted: #888888; --accent: #555555; --ghost: #CCCCCC; }
    @media (prefers-color-scheme: dark) {
      :root { --rule: #444444; --muted: #777777; --accent: #AAAAAA; --ghost: #2A2A2A; }
    }
    .mono { font-family: ui-monospace, "SFMono-Regular", "SF Mono", Menlo, Consolas, "Liberation Mono", monospace; }
    .draw { stroke: var(--rule); stroke-width: 1; stroke-dasharray: 760; stroke-dashoffset: 760; animation: d 1.3s cubic-bezier(.6,0,.2,1) .2s forwards; }
    @keyframes d { to { stroke-dashoffset: 0; } }
    .f { opacity: 0; animation: f .8s ease .1s forwards; }
    @keyframes f { to { opacity: 1; } }
    .tick { animation: p 2.4s ease-in-out infinite; }
    @keyframes p { 0%,100%{opacity:1} 50%{opacity:1} }
    @media (prefers-reduced-motion: reduce) {
      .draw,.f,.tick { animation: none; } .draw { stroke-dashoffset: 0; } .f { opacity: 1; }
    }
      :root { --bone: #000000; --muted: #000000; --dim: #000000; --rule: #000000; --accent: #000000; --node-bg: #FFFFFF; --core-bg: #FFFFFF; }
  :root { --bone:#FFFFFF; --muted:#FFFFFF; --dim:#FFFFFF; --rule:#FFFFFF; --accent:#FFFFFF; --node-bg:#000000; --core-bg:#000000; --ghost:#FFFFFF; --ink:#FFFFFF; --paper:#000000; --ghost:#FFFFFF; }
</style>
  <g class="f">
    <text class="mono" x="48" y="68" font-size="52" fill="var(--ghost)">05</text>
    <text class="mono tick" x="128" y="58" font-size="14" fill="var(--accent)" letter-spacing="6">THE ROUTE</text>
    <text class="mono" x="952" y="58" font-size="11" fill="var(--muted)" letter-spacing="2" text-anchor="end">~/05-journey</text>
  </g>
  <line class="draw" x1="278" y1="53" x2="840" y2="53"/>
</svg>