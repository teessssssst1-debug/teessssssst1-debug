<svg viewBox="0 0 1000 110" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Status: building. Assam, India. chinmoydas.netlify.app">
  <style>
    :root { --bone: #444444; --muted: #888888; --rule: #C0C0C0; --accent: #555555; }
    @media (prefers-color-scheme: dark) { :root { --bone: #DDDDDD; --muted: #777777; --rule: #444444; --accent: #AAAAAA; } }
    .mono { font-family: ui-monospace, "SFMono-Regular", "SF Mono", Menlo, Consolas, "Liberation Mono", monospace; }
    .draw { stroke: var(--rule); stroke-width: 1; stroke-dasharray: 1000; stroke-dashoffset: 1000; animation: d 1.6s cubic-bezier(.6,0,.2,1) forwards; }
    @keyframes d { to { stroke-dashoffset: 0; } }
    .dot { animation: p 2.4s ease-in-out infinite; }
    .ring { animation: r 2.4s ease-out infinite; transform-origin: 60px 64px; }
    @keyframes p { 0%,100%{opacity:1} 50%{opacity:.35} }
    @keyframes r { 0%{transform:scale(.4);opacity:.8} 80%,100%{transform:scale(2.6);opacity:0} }
    @media (prefers-reduced-motion: reduce) { .draw,.dot,.ring{animation:none} .draw{stroke-dashoffset:0} .ring{opacity:0} }
      :root { --bone: #000000; --muted: #000000; --dim: #000000; --rule: #000000; --accent: #000000; --node-bg: #FFFFFF; --core-bg: #FFFFFF; --ghost: #000000; }
  </style>
  <line class="draw" x1="48" y1="24" x2="952" y2="24"/>
  <circle class="ring" cx="60" cy="64" r="5" stroke="var(--accent)" stroke-width="1" fill="none"/>
  <circle class="dot" cx="60" cy="64" r="4" fill="var(--accent)"/>
  <text class="mono" x="82" y="62" font-size="12" letter-spacing="3" fill="var(--bone)">STATUS &#8212; BUILDING</text>
  <text class="mono" x="82" y="82" font-size="11" letter-spacing="2" fill="var(--muted)">shipping AI systems, probably past midnight</text>
  <text class="mono" x="952" y="66" font-size="15" text-anchor="end" fill="var(--muted)">chinmoydas.netlify.app&#160;&#160;&#183;&#160;&#160;Assam, IN&#160;&#160;&#183;&#160;&#160;&#169; 2026</text>
</svg>
