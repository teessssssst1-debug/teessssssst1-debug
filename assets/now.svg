<svg viewBox="0 0 1000 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Now: software engineer with 3+ years experience, full-stack and AI systems, open to full-time roles">
  <style>
    :root { --bone: #444444; --rule: #C0C0C0; --accent: #555555; }
    @media (prefers-color-scheme: dark) { :root { --bone: #DDDDDD; --rule: #444444; --accent: #AAAAAA; } }
    .mono { font-family: ui-monospace, "SFMono-Regular", "SF Mono", Menlo, Consolas, "Liberation Mono", monospace; }
    .belt { animation: belt 36s linear infinite; }
    @keyframes belt { from{transform:translateX(0)} to{transform:translateX(-1560px)} }
    .dot { animation: pulse 2.4s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.25} }
    @media (prefers-reduced-motion: reduce) { .belt,.dot { animation: none; } }
    .lf { display: block; } .df { display: none; }
    @media (prefers-color-scheme: dark) { .lf { display: none; } .df { display: block; } }
      :root { --bone: #000000; --muted: #000000; --dim: #000000; --rule: #000000; --accent: #000000; --node-bg: #FFFFFF; --core-bg: #FFFFFF; --ghost: #000000; }
  </style>
  <line x1="0" y1="0.5" x2="1000" y2="0.5" stroke="var(--rule)"/>
  <line x1="0" y1="63.5" x2="1000" y2="63.5" stroke="var(--rule)"/>
  <g class="belt">
    <text class="mono" x="60" y="38" font-size="13" letter-spacing="2">
      <tspan fill="var(--accent)">NOW&#160;&#160;&#9656;&#160;&#160;</tspan><tspan fill="var(--bone)">SOFTWARE ENGINEER · 3+ YRS</tspan><tspan fill="var(--accent)">&#160;&#160;&#160;&#10038;&#160;&#160;&#160;</tspan><tspan fill="var(--bone)">FULL-STACK &amp; AI SYSTEMS</tspan><tspan fill="var(--accent)">&#160;&#160;&#160;&#10038;&#160;&#160;&#160;</tspan><tspan fill="var(--bone)">FOOTPRINTIQ · WORXSTAX · BUJIBO.AI</tspan><tspan fill="var(--accent)">&#160;&#160;&#160;&#10038;&#160;&#160;&#160;</tspan><tspan fill="var(--bone)">OPEN TO FULL-TIME ROLES &amp; COLLABORATION</tspan><tspan fill="var(--accent)">&#160;&#160;&#160;&#10038;&#160;&#160;&#160;</tspan>
    </text>
    <text class="mono" x="1620" y="38" font-size="13" letter-spacing="2">
      <tspan fill="var(--accent)">NOW&#160;&#160;&#9656;&#160;&#160;</tspan><tspan fill="var(--bone)">SOFTWARE ENGINEER · 3+ YRS</tspan><tspan fill="var(--accent)">&#160;&#160;&#160;&#10038;&#160;&#160;&#160;</tspan><tspan fill="var(--bone)">FULL-STACK &amp; AI SYSTEMS</tspan><tspan fill="var(--accent)">&#160;&#160;&#160;&#10038;&#160;&#160;&#160;</tspan><tspan fill="var(--bone)">FOOTPRINTIQ · WORXSTAX · BUJIBO.AI</tspan><tspan fill="var(--accent)">&#160;&#160;&#160;&#10038;&#160;&#160;&#160;</tspan><tspan fill="var(--bone)">OPEN TO FULL-TIME ROLES &amp; COLLABORATION</tspan><tspan fill="var(--accent)">&#160;&#160;&#160;&#10038;&#160;&#160;&#160;</tspan>
    </text>
  </g>
  <defs>
    <linearGradient id="lm-l" x1="0" x2="1" y1="0" y2="0"><stop offset="0" stop-color="#FFFFFF" stop-opacity="1"/><stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/></linearGradient>
    <linearGradient id="lm-d" x1="0" x2="1" y1="0" y2="0"><stop offset="0" stop-color="#000000" stop-opacity="1"/><stop offset="1" stop-color="#000000" stop-opacity="0"/></linearGradient>
    <mask id="ml"><rect width="52" height="64" fill="url(#lm-l)"/></mask>
    <mask id="md"><rect width="52" height="64" fill="url(#lm-d)"/></mask>
